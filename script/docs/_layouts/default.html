<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{%- include head.html -%}

<body>

  {%- include header.html -%}

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {%- include footer.html -%}

  <!-- Custom JavaScript -->
  <script>
    // Smooth scrolling for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
          behavior: 'smooth'
        });
      });
    });

    // Code copy functionality
    document.querySelectorAll('pre code').forEach(block => {
      const button = document.createElement('button');
      button.className = 'copy-button';
      button.textContent = 'Copy';
      button.style.cssText = `
        position: absolute;
        top: 5px;
        right: 5px;
        background: #f1f3f4;
        border: 1px solid #dadce0;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
      `;
      
      const pre = block.parentNode;
      pre.style.position = 'relative';
      pre.appendChild(button);
      
      pre.addEventListener('mouseenter', () => button.style.opacity = '1');
      pre.addEventListener('mouseleave', () => button.style.opacity = '0');
      
      button.addEventListener('click', () => {
        navigator.clipboard.writeText(block.textContent).then(() => {
          button.textContent = 'Copied!';
          setTimeout(() => button.textContent = 'Copy', 2000);
        });
      });
    });

    // Add external link indicators
    document.querySelectorAll('a[href^="http"]').forEach(link => {
      if (!link.hostname.includes(window.location.hostname)) {
        link.innerHTML += ' <svg style="width:12px;height:12px;vertical-align:middle;margin-left:2px;" viewBox="0 0 24 24"><path fill="currentColor" d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z" /></svg>';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
      }
    });

    // Enhanced table of contents
    const headings = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    if (headings.length > 3) {
      const toc = document.createElement('nav');
      toc.className = 'table-of-contents';
      toc.innerHTML = '<h3>Table of Contents</h3><ul></ul>';
      toc.style.cssText = `
        background: #f8f9fa;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        padding: 1rem;
        margin: 1rem 0;
        position: sticky;
        top: 20px;
        max-height: 70vh;
        overflow-y: auto;
      `;
      
      const ul = toc.querySelector('ul');
      ul.style.cssText = 'margin: 0; padding-left: 1rem; list-style: none;';
      
      headings.forEach((heading, index) => {
        if (heading.tagName !== 'H1') {
          const id = heading.id || `heading-${index}`;
          heading.id = id;
          
          const li = document.createElement('li');
          li.style.cssText = `margin: 0.25rem 0; padding-left: ${(parseInt(heading.tagName.substr(1)) - 2) * 0.5}rem;`;
          li.innerHTML = `<a href="#${id}" style="text-decoration: none; color: #667eea;">${heading.textContent}</a>`;
          ul.appendChild(li);
        }
      });
      
      const firstH2 = document.querySelector('h2');
      if (firstH2) {
        firstH2.parentNode.insertBefore(toc, firstH2);
      }
    }
  </script>

</body>

</html>
