# GitHub Pages Configuration for Geodynamo.jl

# Site settings
title: "Geodynamo.jl"
description: "High-performance Earth's magnetic field simulation in Julia"
url: "https://subhk.github.io"
baseurl: "/Geodynamo.jl"

# Author info
author:
  name: "Subhajit Kar"
  email: "your.email@example.com"

# Theme
theme: minima

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation (for themes that support it)
header_pages:
  - getting-started.md
  - api-reference.md  
  - visualization.md
  - examples.md

# Social links
github_username: subhk
linkedin_username: your-linkedin

# Google Analytics (optional)
# google_analytics: UA-XXXXXXXXX-X

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md

# Custom variables
custom:
  julia_version: "1.8+"
  package_version: "0.1.0"
  repository_url: "https://github.com/subhk/Geodynamo.jl"