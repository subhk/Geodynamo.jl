name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        description: "How many days back to check for new JuliaRegistrator comments"
        required: false
        default: "3"

permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history for proper tagging
          fetch-depth: 0
          
      - name: Run TagBot
        uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Create a GitHub release for each tag
          ssh: ${{ secrets.DOCUMENTER_KEY }}
          # Include changelog in release notes
          changelog: |
            ## Changelog
            
            This release includes the following changes:
            
            {release_notes}
            
            For a complete changelog, see the [commit history](https://github.com/${{ github.repository }}/compare/{previous_tag}...{tag}).
            
            ## Installation
            
            To install this version:
            ```julia
            using Pkg
            Pkg.add("Geodynamo")
            ```
            
            Or to install a specific version:
            ```julia
            using Pkg
            Pkg.add(name="Geodynamo", version="{version}")
            ```
          # Additional settings
          lookback: ${{ github.event.inputs.lookback || '3' }}
          registry: true
          # Custom release notes
          changelog_ignore_labels: |
            documentation
            style
            refactor
            test
            ci
          # Include all pull requests in release notes  
          changelog_include_all_prs: false